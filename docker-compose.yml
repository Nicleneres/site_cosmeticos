version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: visionbet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: visionbet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d visionbet']
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - visionbet_pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  visionbet_pgdata:
